<head>

<title>Schedule Checker</title><style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body::before{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:inherit;
  filter: blur(80px);
  opacity:0.3;
  z-index:-1;
}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.4s;
}

.bg-off{
  background: linear-gradient(270deg,#e8eaf6,#f3e5f5,#f8f9fa);
  background-size: 600% 600%;
  animation: flow 12s ease infinite;
}

.bg-pagi{
  background: linear-gradient(270deg,#fff3e0,#ffe0b2,#ffecb3);
  background-size: 600% 600%;
  animation: flow 12s ease infinite;
}

.bg-malam{
  background: linear-gradient(270deg,#e3f2fd,#e1f5fe,#ede7f6);
  background-size: 600% 600%;
  animation: flow 12s ease infinite;
}

.main{width:100%;max-width:420px;padding:20px}

/* Glass effect container */
.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding:20px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{text-align:center;margin:0 0 15px;color:#000000}
.group{margin-top:12px}
label{font-size:13px;color:#2d3436}

select,input{
  width:100%;
  margin-top:5px;
  padding:10px;
  border-radius:8px;

  background: rgba(255,255,255,0.15);
  color:#2d3436;

  border:1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
}

select:focus,input:focus{
  outline:none;
  border:1px solid rgba(255,255,255,0.6);
}

input[type=\"date\"]{
  color:#2d3436;
}

.logo{
  width:100px;
  height:100px;
  margin:0 auto 10px;
  transition:0.3s;

  border-radius:50%;
  background: rgba(0,0,0,0.0) url('logo.png') center/60% no-repeat;

  backdrop-filter: blur(5px);
  border:0px solid rgba(255,255,255,0.3);
}

.logo:hover{
  transform:scale(1.05);
}

button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#000000;
  color:#fff;
  cursor:pointer;
}

.result{
  margin-top:18px;
  padding:15px;
  border-radius:10px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.3);

  display:none;
  line-height:1.6;
}

.shift-off{color:#636e72}
.shift-pagi{color:#e1b12c}
.shift-malam{color:#0984e3}

.lembur{font-weight:bold;margin-top:5px}
.libur-nasional{color:#d63031}
.libur-islam{color:#00b894}
.libur-internasional{color:#6c5ce7}
.libur-khusus{color:#fd79a8}

.watermark{
  text-align:center;
  margin-top:10px;
  color:#000000;
  font-size:12px;
}

#shareBtn{
  background:#25D366;
  margin-top:10px;
}

<body class="bg-off"><div class="main">
  <div class="card">
      <div class="logo"></div>
    <h2>GL SCHEDULE CHECKER V2.2</h2><div class="group">
  <label>Pilih Grup</label>
  <select id="group">
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>
</div>

<div class="group">
  <label>PilihTanggal</label>
  <input type="date" id="date">
</div>

<button onclick="cek()">Cek Jadwal</button>

<div id="result" class="result"></div>

<button id="shareBtn" style="display:none;">Share ke WhatsApp</button>

  </div>  <div class="watermark">© AprilhxnProject</div>
</div><script>

document.getElementById("shareBtn").onclick = shareWA;

// DATA SHIFT
const pola=["OFF KE 1","OFF KE 2","PAGI KE 1","PAGI KE 2","MALAM KE 1","MALAM KE 2"];
const offset={A:0,B:2,C:4};
const base=new Date("2026-04-12");

// HARI LIBUR + KETERANGAN
const liburMap={
"2026-01-01":"Tahun Baru",
"2026-01-17":"Isra Mikraj",
"2026-02-17":"Imlek",
"2026-03-19":"Nyepi",
"2026-03-20":"Idul Fitri",
"2026-03-21":"Idul Fitri Hari ke-2",
"2026-04-03":"Wafat Isa Almasih",
"2026-05-14":"Kenaikan Isa Almasih",
"2026-05-24":"Waisak",
"2026-05-27":"Idul Adha",
"2026-06-01":"Hari Lahir Pancasila",
"2026-06-17":"Tahun Baru Islam",
"2026-08-17":"Hari Kemerdekaan RI",
"2026-09-05":"Maulid Nabi",
"2026-12-25":"Hari Natal"
};

function shareWA(){
  const g=document.getElementById("group").value;
  const tanggal=document.getElementById("date").value;

  const tanggalFormat = formatTanggal(tanggal);
  const namaHari = getNamaHari(tanggal);

  const sel=new Date(tanggal);
  const diff=Math.floor((sel-base)/(1000*60*60*24));

  let i=(diff+offset[g])%6;
  if(i<0)i+=6;

  const shift=pola[i];
  const namaLibur=liburMap[tanggal];
  const isLibur=namaLibur!==undefined;

  let text =
`GL Schedule Checker

Grup : ${g}
Tanggal : ${namaHari}, ${tanggalFormat}
Shift : ${icon(shift)} ${shift}
`;

  if(isLibur){
    text += `\n🔥 LEMBUR (Hari Libur Nasional) - ${namaLibur}`;
  }

  text += `\n\n🔥 Checked By EZ! TOOLS.
  https://schedule-checker.netlify.app/`;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}

// AMBIL TANGGAL HARI INI (LOCAL)
function getTodayLocal(){
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const d=String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function getNamaHari(tanggal){
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const d = new Date(tanggal);
  return hari[d.getDay()];
}
function formatTanggal(tanggal){
  const [tahun, bulan, hari] = tanggal.split("-");
  return `${hari}-${bulan}-${tahun}`;
}

// SET DEFAULT + BLOK TANGGAL LAMPAU
const input=document.getElementById("date");
const today=getTodayLocal();
input.value=today;
input.setAttribute("min",today);

input.addEventListener("change",function(){
  if(this.value<today){
    this.value=today;
  }
});

// ICON
function icon(s){
 if(s.includes("OFF"))return"🛌";
 if(s.includes("PAGI"))return"☀️";
 if(s.includes("MALAM"))return"🌙";
}

// WARNA SHIFT
function warna(s){
 if(s.includes("OFF"))return"shift-off";
 if(s.includes("PAGI"))return"shift-pagi";
 if(s.includes("MALAM"))return"shift-malam";
}

// BACKGROUND DINAMIS
function bg(s){
 const body=document.body;
 body.classList.remove("bg-off","bg-pagi","bg-malam");
 if(s.includes("OFF"))body.classList.add("bg-off");
 if(s.includes("PAGI"))body.classList.add("bg-pagi");
 if(s.includes("MALAM"))body.classList.add("bg-malam");
}

// STYLE LIBUR
function getLiburStyle(nama){
 if(!nama) return "";
 if(nama.includes("Idul")||nama.includes("Islam")||nama.includes("Maulid")) return "libur-islam";
 if(nama.includes("Kemerdekaan")||nama.includes("Pancasila")) return "libur-nasional";
 if(nama.includes("Natal")||nama.includes("Imlek")) return "libur-internasional";
 return "libur-khusus";
}

// MAIN FUNCTION
function cek(){
 const g=document.getElementById("group").value;
 const tanggal=document.getElementById("date").value;
 document.getElementById("shareBtn").style.display="block";
 const tanggalFormat = formatTanggal(tanggal);
 const namaHari = getNamaHari(tanggal);
 const res=document.getElementById("result");

 const today=getTodayLocal();

 // VALIDASI FINAL (ANTI TANGGAL LAMPAU)
 if(tanggal<today){
   alert("Tidak bisa cek tanggal sebelumnya!");
   return;
 }

 const sel=new Date(tanggal);
 const diff=Math.floor((sel-base)/(1000*60*60*24));

 let i=(diff+offset[g])%6;
 if(i<0)i+=6;

 const shift=pola[i];
 const namaLibur=liburMap[tanggal];
 const isLibur=namaLibur!==undefined;

 bg(shift);

 const styleLibur=getLiburStyle(namaLibur);

 res.style.display="block";
 res.innerHTML=
 "<b>Grup :</b> "+g+"<br>"+
"<b>Tanggal :</b> "+namaHari+", "+tanggalFormat+" <br>"+
 "<b>Shift :</b> <span class='"+warna(shift)+"'><b>"+shift+" "+icon(shift)+"</b></span><br>"+
 (isLibur?"<div class='lembur "+styleLibur+"'><b> LEMBUR!🔥  (Hari Libur Nasional) "+namaLibur+"</b></div>":"");
}

</script></body>
</html>
